<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Просмотр документа</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f1117; color: #e4e4e7; height: 100vh; display: flex; flex-direction: column; }
    .toolbar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: #18181b; border-bottom: 1px solid #27272a; flex-shrink: 0; }
    .toolbar .title { font-size: 14px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .toolbar a { font-size: 13px; color: #60a5fa; text-decoration: none; white-space: nowrap; }
    .toolbar a:hover { text-decoration: underline; }
    .viewer { flex: 1; min-height: 0; }
    .viewer iframe { width: 100%; height: 100%; border: none; background: #fff; }
    .error { display: flex; align-items: center; justify-content: center; height: 100%; color: #a1a1aa; font-size: 15px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="title" id="docTitle">Loading...</div>
    <a id="downloadLink" href="#" download>Скачать</a>
  </div>
  <div class="viewer" id="viewer"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const fileUrl = params.get("url");
    const fileName = params.get("name") || fileUrl?.split("/").pop() || "document";

    document.title = fileName + " - MedGraph RAG";
    document.getElementById("docTitle").textContent = decodeURIComponent(fileName);
    document.getElementById("downloadLink").href = fileUrl || "#";

    const viewer = document.getElementById("viewer");

    if (!fileUrl) {
      viewer.innerHTML = '<div class="error">No file URL provided.</div>';
    } else {
      const iframe = document.createElement("iframe");
      iframe.src = fileUrl;
      viewer.appendChild(iframe);
    }
  </script>
</body>
</html>
